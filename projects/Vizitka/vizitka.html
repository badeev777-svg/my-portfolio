<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бадеев Александр — Специалист по нейросетям</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #a855f7;
      --text: #e2e8f0;
      --muted: #64748b;
      --card: #111118;
      --border: rgba(124,58,237,0.18);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-canvas svg {
      width: 100%;
      height: 100%;
      opacity: 0.13;
    }

    .node { animation: pulse-node 4s ease-in-out infinite; }
    .node:nth-child(2n)  { animation-delay: -1s; }
    .node:nth-child(3n)  { animation-delay: -2s; }
    .node:nth-child(5n)  { animation-delay: -0.5s; }

    @keyframes pulse-node {
      0%, 100% { opacity: 0.5; r: 3px; }
      50%       { opacity: 1;   r: 5px; }
    }

    .edge { animation: pulse-edge 6s ease-in-out infinite; }
    .edge:nth-child(2n) { animation-delay: -2s; }
    .edge:nth-child(3n) { animation-delay: -4s; }

    @keyframes pulse-edge {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 0.7; }
    }

    /* ── Glow orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: rgba(124,58,237,0.15);
      top: -150px; left: -150px;
      animation: float-orb 14s ease-in-out infinite;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: rgba(6,182,212,0.1);
      bottom: -100px; right: -100px;
      animation: float-orb 18s ease-in-out infinite reverse;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: rgba(168,85,247,0.08);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation: float-orb 10s ease-in-out infinite;
    }

    @keyframes float-orb {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(40px,-30px) scale(1.05); }
      66%       { transform: translate(-30px,20px) scale(0.95); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 48px;
      width: min(520px, calc(100vw - 32px));
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(124,58,237,0.08);
      animation: card-in 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* Inner glow border */
    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(124,58,237,0.5), rgba(6,182,212,0.3), rgba(124,58,237,0.1));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto 28px;
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent3), var(--accent));
      animation: spin-ring 6s linear infinite;
    }

    @keyframes spin-ring {
      to { transform: rotate(360deg); }
    }

    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--card);
    }

    .avatar {
      position: relative;
      z-index: 1;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: -1px;
      user-select: none;
    }

    /* ── Name ── */
    .name {
      font-size: clamp(1.75rem, 5vw, 2.4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #c4b5fd 0%, #818cf8 30%, #38bdf8 65%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(124,58,237,0.4));
      animation: glow-name 3s ease-in-out infinite;
      margin-bottom: 10px;
    }

    @keyframes glow-name {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(124,58,237,0.4)); }
      50%       { filter: drop-shadow(0 0 35px rgba(56,189,248,0.5)); }
    }

    /* ── Role badge ── */
    .role {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 0.88rem;
      color: #a78bfa;
      letter-spacing: 0.01em;
      margin-bottom: 36px;
    }

    .role-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      animation: blink-dot 2s ease-in-out infinite;
    }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.35), rgba(6,182,212,0.35), transparent);
      margin: 0 auto 32px;
    }

    /* ── Social icons ── */
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: var(--muted);
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }

    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .social-link.tg::before  { background: radial-gradient(circle at center, rgba(40,168,225,0.25), transparent 70%); }
    .social-link.gh::before  { background: radial-gradient(circle at center, rgba(255,255,255,0.12), transparent 70%); }
    .social-link.max::before { background: radial-gradient(circle at center, rgba(255,80,0,0.25), transparent 70%); }

    .social-link:hover {
      transform: translateY(-4px) scale(1.1);
      border-color: rgba(255,255,255,0.18);
      color: #fff;
    }

    .social-link.tg:hover  { box-shadow: 0 8px 25px rgba(40,168,225,0.3);  border-color: rgba(40,168,225,0.4); }
    .social-link.gh:hover  { box-shadow: 0 8px 25px rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
    .social-link.max:hover { box-shadow: 0 8px 25px rgba(255,80,0,0.3);     border-color: rgba(255,80,0,0.4); }

    .social-link:hover::before { opacity: 1; }

    .social-link svg {
      width: 22px;
      height: 22px;
      position: relative;
      z-index: 1;
      transition: transform 0.2s;
    }
    .social-link:hover svg { transform: scale(1.1); }

    /* ── CTA button ── */
    .cta-wrap {
      position: relative;
      display: inline-block;
    }

    .cta-glow {
      position: absolute;
      inset: -8px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      filter: blur(18px);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 0;
    }

    .cta-wrap:hover .cta-glow { opacity: 0.5; }

    .cta {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 34px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.01em;
      border: none;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.3);
      overflow: hidden;
    }

    .cta::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .cta:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 32px rgba(124,58,237,0.45), 0 2px 8px rgba(6,182,212,0.3);
    }

    .cta:active {
      transform: scale(0.97);
    }

    .cta svg {
      width: 18px;
      height: 18px;
      animation: wiggle-arrow 2.5s ease-in-out infinite;
    }

    @keyframes wiggle-arrow {
      0%, 100% { transform: translateX(0); }
      60%       { transform: translateX(4px); }
      80%       { transform: translateX(-2px); }
    }

    /* ── Footer tag ── */
    .footer-tag {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #2d3748;
      letter-spacing: 0.05em;
    }

    /* ── Ripple ── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: scale(0);
      animation: ripple-anim 0.55s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      .socials { gap: 12px; }
      .social-link { width: 46px; height: 46px; }
    }
  </style>
</head>
<body>

  </div>

  <!-- Ambient glow orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Card -->

      <div class="avatar-ring"></div>
      <div class="avatar">БА</div>
    </div>

    <h1 class="name">Бадеев Александр</h1>

    <!-- Role -->

      <span class="role-dot"></span>
      Специалист по нейросетям
    </div>

    <div class="divider"></div>

    <!-- Social icons -->
    <div class="socials">

      <!-- Telegram -->
      <a class="social-link tg" href="https://t.me/CowboyAleksandr" target="_blank" rel="noopener" aria-label="Telegram">

          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.93 6.612-1.69 7.964c-.127.566-.46.703-.935.438l-2.585-1.905-1.248 1.2c-.138.138-.253.253-.52.253l.185-2.633 4.802-4.337c.209-.185-.045-.288-.324-.103L7.8 13.795l-2.544-.795c-.553-.173-.566-.553.115-.82l9.947-3.836c.46-.168.864.103.612.268z" fill="currentColor"/>

        Написать мне

  <script>
    // Ripple effect on CTA
    document.getElementById('ctaBtn').addEventListener('click', function(e) {
      const btn = this;
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.cssText = `left:${x}px;top:${y}px;width:20px;height:20px;margin-left:-10px;margin-top:-10px;`;
      btn.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    });

    // Parallax card on mouse move (desktop)
    const card = document.querySelector('.card');
    document.addEventListener('mousemove', (e) => {
      if (window.innerWidth < 600) return;
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      card.style.transform = `perspective(1000px) rotateY(${dx * 4}deg) rotateX(${-dy * 4}deg)`;
    });
    document.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  </script>
