<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мини-CRM — Учёт клиентов</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── BACKGROUND ORBS ── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .045;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 650px; height: 650px;
      background: var(--accent1, #6c63ff);
      top: -220px; left: -180px;
      animation: orb1 22s ease-in-out infinite;
    }
    body::after {
      width: 520px; height: 520px;
      background: var(--accent2, #00d4aa);
      bottom: -160px; right: -160px;
      animation: orb2 28s ease-in-out infinite;
    }
    @keyframes orb1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(70px,50px) scale(1.12); }
      66%      { transform: translate(-40px,70px) scale(.9); }
    }
    @keyframes orb2 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(-55px,-35px) scale(1.08); }
      66%      { transform: translate(35px,-55px) scale(.93); }
    }

    :root {
      --bg-dark:    #0a0e1a;
      --bg-card:    #111827;
      --bg-modal:   #0f1626;
      --accent1:    #6c63ff;
      --accent2:    #00d4aa;
      --accent3:    #ff6b6b;
      --accent4:    #f59e0b;
      --text-main:  #e8eaf0;
      --text-muted: #8892a4;
      --border:     rgba(108,99,255,.2);
      --border-h:   rgba(108,99,255,.5);

      --s-new:         #6c63ff;
      --s-in-progress: #00d4aa;
      --s-negotiation: #f59e0b;
      --s-won:         #22c55e;
      --s-lost:        #ff6b6b;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      position: relative;
    }

    /* All content above the orbs */
    header, .stats-bar, .main-content, .overlay, .confirm-overlay, #toast {
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #0f1626 0%, #0a0e1a 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      animation: headerIn .55s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes headerIn {
      from { transform: translateY(-110%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent1));
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
      flex-shrink: 0;
      animation: logoShift 5s ease-in-out infinite;
    }
    @keyframes logoShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 10px 12px 10px 38px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-main);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }

    #searchInput:focus { border-color: var(--accent1); }
    #searchInput::placeholder { color: var(--text-muted); }

    .btn-add {
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--accent1), #8b5cf6);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }
    .btn-add::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
      animation: shimmer 2.8s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { left: -100%; }
      100% { left: 200%; }
    }
    .btn-add:hover { opacity: .92; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,.45); }
    .btn-add:active { transform: translateY(0); box-shadow: none; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      transition: border-color .25s, background .25s, transform .2s, box-shadow .25s;
      white-space: nowrap;
      font-size: .88rem;
      animation: pillIn .5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes pillIn {
      from { opacity: 0; transform: translateX(-14px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .stat-pill:hover, .stat-pill.active {
      border-color: var(--c, var(--accent1));
      background: rgba(108,99,255,.1);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
    }
    .stat-pill.active { background: rgba(108,99,255,.15); }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--c, var(--accent1));
      flex-shrink: 0;
      animation: dotPulse 2.4s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .55; transform: scale(1.35); }
    }

    .stat-count {
      background: rgba(255,255,255,.1);
      border-radius: 999px;
      padding: 1px 7px;
      font-size: .78rem;
      font-weight: 600;
    }

    /* ── GRID ── */
    .main-content { padding: 0 24px 40px; }

    .clients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* ── CLIENT CARD ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: border-color .25s, transform .25s, box-shadow .25s;
      cursor: default;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: cardIn .45s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card:hover {
      border-color: var(--card-color, var(--border-h));
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(0,0,0,.35), 0 0 0 1px var(--card-color, transparent);
    }
    /* Card exit before delete */
    .card.exit {
      animation: cardOut .28s ease forwards !important;
    }
    @keyframes cardOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(.88) translateY(-10px); }
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent1), #8b5cf6);
      animation: avatarGlow 3.5s ease-in-out infinite;
      transition: transform .2s;
    }
    .card:hover .avatar {
      transform: scale(1.08) rotate(-3deg);
    }
    @keyframes avatarGlow {
      0%,100% { box-shadow: 0 0 0 0 rgba(108,99,255,0); }
      50%      { box-shadow: 0 0 14px 3px rgba(108,99,255,.28); }
    }

    .card-name-wrap { flex: 1; min-width: 0; }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-company {
      font-size: .83rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-badge {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      border: 1px solid;
      white-space: nowrap;
      flex-shrink: 0;
      animation: badgeIn .4s cubic-bezier(.16,1,.3,1) .1s both;
    }
    @keyframes badgeIn {
      from { opacity: 0; transform: scale(.75); }
      to   { opacity: 1; transform: scale(1); }
    }

    .card-contacts {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .85rem;
      color: var(--text-muted);
    }
    .contact-row svg { flex-shrink: 0; }
    .contact-row a { color: var(--accent2); text-decoration: none; }
    .contact-row a:hover { text-decoration: underline; }

    .card-notes {
      background: rgba(255,255,255,.04);
      border-left: 3px solid var(--accent1);
      padding: 8px 10px;
      border-radius: 0 8px 8px 0;
      font-size: .83rem;
      color: var(--text-muted);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 72px;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .78rem;
      color: var(--text-muted);
    }

    .card-actions {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,.06);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, color .2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,.12); color: var(--text-main); }
    .icon-btn.delete:hover { background: rgba(255,107,107,.15); color: var(--accent3); }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state svg { opacity: .3; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text-main); opacity: .6; }

    /* ── MODAL ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg-modal);
      border: 1px solid var(--border-h);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(.88) translateY(24px);
      transition: transform .38s cubic-bezier(.16,1,.3,1);
    }
    .overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .modal-title {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,.06);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    .modal-close:hover { background: rgba(255,255,255,.12); color: var(--text-main); }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: .85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    input, select, textarea {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-main);
      font-size: .92rem;
      font-family: inherit;
      outline: none;
      padding: 10px 12px;
      transition: border-color .2s, background .2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent1);
      background: rgba(108,99,255,.07);
    }

    select option { background: #1a2035; }

    textarea {
      resize: vertical;
      min-height: 90px;
      line-height: 1.5;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 22px;
      justify-content: flex-end;
    }

    .btn-cancel {
      padding: 10px 20px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: .92rem;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,.1); color: var(--text-main); }

    .btn-save {
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--accent1), #8b5cf6);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-save:hover { opacity: .88; }

    /* ── CONFIRM DIALOG ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }

    .confirm-box {
      background: var(--bg-modal);
      border: 1px solid rgba(255,107,107,.35);
      border-radius: 16px;
      padding: 24px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      transform: scale(.88) translateY(16px);
      transition: transform .35s cubic-bezier(.16,1,.3,1);
    }
    .confirm-overlay.open .confirm-box { transform: scale(1) translateY(0); }
    .confirm-box h3 { margin-bottom: 8px; }
    .confirm-box p { color: var(--text-muted); font-size: .9rem; margin-bottom: 20px; }
    .confirm-btns { display: flex; gap: 10px; justify-content: center; }

    .btn-danger {
      padding: 9px 20px;
      background: linear-gradient(135deg, #ef4444, var(--accent3));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: .92rem;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(108,99,255,.4); border-radius: 3px; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(30px) scale(.92);
      background: #1a2035;
      border: 1px solid var(--border-h);
      color: var(--text-main);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: .88rem;
      opacity: 0;
      transition: opacity .25s, transform .4s cubic-bezier(.16,1,.3,1);
      z-index: 400;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  </style>
</head>
<body>

<header>
  <div class="logo">CRM</div>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="text" placeholder="Поиск по имени, компании, email..." />
  </div>
  <button class="btn-add" onclick="openModal()">+ Добавить клиента</button>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="main-content">
  <div class="clients-grid" id="clientsGrid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Новый клиент</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <form class="form-grid" id="clientForm" onsubmit="saveClient(event)">
      <input type="hidden" id="clientId" />
      <div class="form-row">
        <label>
          Имя клиента *
          <input id="fName" type="text" placeholder="Иван Иванов" required />
        </label>
        <label>
          Компания
          <input id="fCompany" type="text" placeholder="ООО Пример" />
        </label>
      </div>
      <div class="form-row">
        <label>
          Телефон
          <input id="fPhone" type="tel" placeholder="+7 999 123-45-67" />
        </label>
        <label>
          Email
          <input id="fEmail" type="email" placeholder="ivan@example.com" />
        </label>
      </div>
      <label>
        Статус сделки
        <select id="fStatus">
          <option value="new">Новый</option>
          <option value="in-progress">В работе</option>
          <option value="negotiation">Переговоры</option>
          <option value="won">Сделка закрыта</option>
          <option value="lost">Отказ</option>
        </select>
      </label>
      <label>
        Заметки
        <textarea id="fNotes" placeholder="Детали сделки, история общения..."></textarea>
      </label>
      <div class="modal-footer">
        <button type="button" class="btn-cancel" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn-save">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Удалить клиента?</h3>
    <p>Это действие нельзя отменить.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Отмена</button>
      <button class="btn-danger" onclick="confirmDelete()">Удалить</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  /* ── DATA ── */
  const STATUSES = {
    'new':         { label: 'Новый',            color: '#6c63ff' },
    'in-progress': { label: 'В работе',         color: '#00d4aa' },
    'negotiation': { label: 'Переговоры',       color: '#f59e0b' },
    'won':         { label: 'Сделка закрыта',   color: '#22c55e' },
    'lost':        { label: 'Отказ',            color: '#ff6b6b' },
  };

  const ALL_KEY = 'crm_clients';
  let clients = JSON.parse(localStorage.getItem(ALL_KEY) || '[]');
  let activeFilter = 'all';
  let deleteTarget = null;
  let initialRenderDone = false;

  function save() {
    localStorage.setItem(ALL_KEY, JSON.stringify(clients));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  /* ── RENDER ── */
  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    return clients.filter(c => {
      const matchStatus = activeFilter === 'all' || c.status === activeFilter;
      const matchSearch = !q
        || c.name.toLowerCase().includes(q)
        || (c.company || '').toLowerCase().includes(q)
        || (c.email || '').toLowerCase().includes(q)
        || (c.phone || '').includes(q);
      return matchStatus && matchSearch;
    });
  }

  function initials(name) {
    return name.split(' ').slice(0, 2).map(p => p[0] || '').join('').toUpperCase() || '?';
  }

  function fmtDate(ts) {
    return new Date(ts).toLocaleDateString('ru-RU', { day: '2-digit', month: 'short' });
  }

  function renderStats() {
    const bar = document.getElementById('statsBar');
    const total = clients.length;
    const counts = {};
    for (const k of Object.keys(STATUSES)) counts[k] = 0;
    clients.forEach(c => { if (counts[c.status] !== undefined) counts[c.status]++; });

    const allActive = activeFilter === 'all' ? ' active' : '';
    const pillDelay = !initialRenderDone;
    let html = `<div class="stat-pill${allActive}" style="--c:var(--accent1)${pillDelay ? '; animation-delay:.05s' : '; animation:none'}" onclick="setFilter('all')">
      <span class="stat-dot"></span> Все <span class="stat-count">${total}</span>
    </div>`;

    let pi = 1;
    for (const [k, s] of Object.entries(STATUSES)) {
      const active = activeFilter === k ? ' active' : '';
      html += `<div class="stat-pill${active}" style="--c:${s.color}${pillDelay ? `; animation-delay:${pi * 0.07}s` : '; animation:none'}" onclick="setFilter('${k}')">
        <span class="stat-dot" style="background:${s.color}"></span>
        ${s.label} <span class="stat-count">${counts[k]}</span>
      </div>`;
      pi++;
    }
    bar.innerHTML = html;
  }

  function renderCards() {
    const grid = document.getElementById('clientsGrid');
    const filtered = getFiltered();

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state">
        <svg width="64" height="64" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <h3>${clients.length ? 'Ничего не найдено' : 'Клиентов пока нет'}</h3>
        <p>${clients.length ? 'Попробуйте изменить запрос или фильтр' : 'Добавьте первого клиента'}</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map((c, i) => {
      const s = STATUSES[c.status] || STATUSES['new'];
      const ini = initials(c.name);
      const stagger = !initialRenderDone ? `animation-delay:${i * 0.07}s` : '';

      const phoneLine = c.phone
        ? `<div class="contact-row">
             <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
               <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
             </svg>
             <a href="tel:${c.phone}">${c.phone}</a>
           </div>` : '';

      const emailLine = c.email
        ? `<div class="contact-row">
             <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
               <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
             </svg>
             <a href="mailto:${c.email}">${c.email}</a>
           </div>` : '';

      const notesBlock = c.notes
        ? `<div class="card-notes">${escHtml(c.notes)}</div>` : '';

      return `<div class="card" id="card-${c.id}" style="--card-color:${s.color}40; ${stagger}">
        <div class="card-header">
          <div class="avatar">${ini}</div>
          <div class="card-name-wrap">
            <div class="card-name">${escHtml(c.name)}</div>
            ${c.company ? `<div class="card-company">${escHtml(c.company)}</div>` : ''}
          </div>
          <span class="status-badge"
            style="color:${s.color}; border-color:${s.color}40; background:${s.color}15">
            ${s.label}
          </span>
        </div>
        ${(phoneLine || emailLine) ? `<div class="card-contacts">${phoneLine}${emailLine}</div>` : ''}
        ${notesBlock}
        <div class="card-footer">
          <span>Добавлен ${fmtDate(c.createdAt)}</span>
          <div class="card-actions">
            <button class="icon-btn" title="Редактировать" onclick="openModal('${c.id}')">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
            </button>
            <button class="icon-btn delete" title="Удалить" onclick="askDelete('${c.id}')">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function render() {
    renderStats();
    renderCards();
    initialRenderDone = true;
  }

  function setFilter(f) {
    activeFilter = f;
    render();
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── MODAL ── */
  function openModal(id) {
    const overlay = document.getElementById('overlay');
    document.getElementById('modalTitle').textContent = id ? 'Редактировать клиента' : 'Новый клиент';
    document.getElementById('clientId').value = id || '';

    if (id) {
      const c = clients.find(x => x.id === id);
      if (!c) return;
      document.getElementById('fName').value    = c.name    || '';
      document.getElementById('fCompany').value = c.company || '';
      document.getElementById('fPhone').value   = c.phone   || '';
      document.getElementById('fEmail').value   = c.email   || '';
      document.getElementById('fStatus').value  = c.status  || 'new';
      document.getElementById('fNotes').value   = c.notes   || '';
    } else {
      document.getElementById('clientForm').reset();
    }
    overlay.classList.add('open');
    setTimeout(() => document.getElementById('fName').focus(), 50);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  function saveClient(e) {
    e.preventDefault();
    const id      = document.getElementById('clientId').value;
    const name    = document.getElementById('fName').value.trim();
    const company = document.getElementById('fCompany').value.trim();
    const phone   = document.getElementById('fPhone').value.trim();
    const email   = document.getElementById('fEmail').value.trim();
    const status  = document.getElementById('fStatus').value;
    const notes   = document.getElementById('fNotes').value.trim();

    if (!name) return;

    if (id) {
      const idx = clients.findIndex(c => c.id === id);
      if (idx !== -1) {
        clients[idx] = { ...clients[idx], name, company, phone, email, status, notes, updatedAt: Date.now() };
        showToast('Клиент обновлён');
      }
    } else {
      clients.unshift({ id: uid(), name, company, phone, email, status, notes, createdAt: Date.now(), updatedAt: Date.now() });
      showToast('Клиент добавлен');
    }
    save();
    closeModal();
    render();
  }

  /* ── DELETE ── */
  function askDelete(id) {
    deleteTarget = id;
    document.getElementById('confirmOverlay').classList.add('open');
  }

  function closeConfirm() {
    deleteTarget = null;
    document.getElementById('confirmOverlay').classList.remove('open');
  }

  function confirmDelete() {
    if (!deleteTarget) return;
    const id = deleteTarget;
    closeConfirm();
    const card = document.getElementById('card-' + id);
    if (card) {
      card.classList.add('exit');
      setTimeout(() => {
        clients = clients.filter(c => c.id !== id);
        save();
        render();
        showToast('Клиент удалён');
      }, 290);
    } else {
      clients = clients.filter(c => c.id !== id);
      save();
      render();
      showToast('Клиент удалён');
    }
  }

  /* ── TOAST ── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  /* ── SEARCH ── */
  document.getElementById('searchInput').addEventListener('input', render);

  /* ── KEYBOARD ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeConfirm(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });

  /* ── SEED DATA (first launch) ── */
  if (!clients.length) {
    clients = [
      { id: uid(), name: 'Алексей Петров', company: 'ООО Строймаш',      phone: '+7 999 123-45-67', email: 'petrov@stroymash.ru', status: 'in-progress', notes: 'Обсуждаем поставку оборудования на Q3. Следующий созвон в пятницу.', createdAt: Date.now() - 86400000*5, updatedAt: Date.now() - 86400000*2 },
      { id: uid(), name: 'Мария Соколова', company: 'ИП Соколова',        phone: '+7 912 000-11-22', email: 'maria@sokolova.me',  status: 'negotiation', notes: 'Интересует пакет Premium. Просит скидку 10%.', createdAt: Date.now() - 86400000*10, updatedAt: Date.now() - 86400000*1 },
      { id: uid(), name: 'Дмитрий Власов', company: 'Власов и партнёры',  phone: '+7 903 555-77-88', email: 'vlasov@law.ru',      status: 'won',         notes: 'Сделка закрыта. Контракт подписан 01.04.', createdAt: Date.now() - 86400000*20, updatedAt: Date.now() - 86400000*3 },
      { id: uid(), name: 'Ольга Зимина',   company: 'Зимина Дизайн',     phone: '',                 email: 'olga@zimina.design',  status: 'new',         notes: '', createdAt: Date.now() - 86400000*1, updatedAt: Date.now() },
      { id: uid(), name: 'Игорь Кравцов',  company: 'МедТех',             phone: '+7 916 444-33-11', email: 'i.kravtsov@medtech.ru', status: 'lost',     notes: 'Выбрали конкурента из-за цены. Вернуться через 6 мес.', createdAt: Date.now() - 86400000*30, updatedAt: Date.now() - 86400000*7 },
    ];
    save();
  }

  render();
</script>
</body>
</html>
