<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Нейро-Маркетолог — Конструктор GPT</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark:    #0a0e1a;
      --bg-card:    #111827;
      --accent1:    #6c63ff;
      --accent2:    #00d4aa;
      --accent3:    #ff6b6b;
      --text-main:  #e8eaf0;
      --text-muted: #8892a4;
      --border:     rgba(108,99,255,.25);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(108,99,255,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,212,170,.13) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 60% 30%, rgba(255,107,107,.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0; z-index: 20;
      background: rgba(10,14,26,.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex; align-items: center; gap: 14px; height: 66px;
    }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .logo-title {
      font-size: 1.05rem; font-weight: 800;
      background: linear-gradient(135deg, #a89cff 0%, #6c63ff 35%, #00d4aa 70%, #38f9d7 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-sub { font-size: .73rem; color: var(--text-muted); margin-top: 1px; }
    .back-link {
      margin-left: auto; display: inline-flex; align-items: center; gap: 6px;
      font-size: .88rem; font-weight: 600; color: var(--text-muted);
      text-decoration: none; transition: color .2s;
    }
    .back-link:hover { color: var(--text-main); }

    /* ── Main ── */
    main { padding: 32px 0 140px; }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 28px; }
    .progress-label {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    }
    .progress-title { font-size: .85rem; font-weight: 600; color: var(--text-muted); }
    .progress-count { font-size: .82rem; font-weight: 700; color: var(--accent1); }
    .progress-track { height: 4px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 2px;
      transition: width .55s cubic-bezier(.4,0,.2,1);
    }

    /* ── Chat ── */
    .chat-area { display: flex; flex-direction: column; gap: 16px; min-height: 200px; }

    /* ── Messages ── */
    .msg { display: flex; gap: 12px; animation: fadeUp .35s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-bot  { align-items: flex-start; }
    .msg-user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0; margin-top: 2px;
    }
    .msg-avatar-user {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; color: var(--text-muted);
      flex-shrink: 0; margin-top: 2px;
    }
    .msg-bubble {
      max-width: 78%; padding: 14px 18px; border-radius: 16px;
      line-height: 1.65; font-size: .92rem;
    }
    .msg-bot .msg-bubble {
      background: var(--bg-card); border: 1px solid var(--border);
      border-top-left-radius: 4px; color: var(--text-main);
    }
    .msg-user .msg-bubble {
      background: linear-gradient(135deg, rgba(108,99,255,.22), rgba(0,212,170,.12));
      border: 1px solid rgba(108,99,255,.28);
      border-top-right-radius: 4px; color: var(--text-main);
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex; gap: 4px; align-items: center;
      padding: 14px 18px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; border-top-left-radius: 4px; width: fit-content;
    }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Options card (checkbox / radio) ── */
    .options-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      margin-top: 16px; animation: fadeUp .35s ease;
    }
    .options-title {
      font-size: .8rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px;
    }
    .options-grid { display: flex; flex-direction: column; gap: 10px; }
    .option-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,.07); background: rgba(255,255,255,.02);
      cursor: pointer; transition: border-color .2s, background .2s; user-select: none;
    }
    .option-item:hover    { border-color: rgba(108,99,255,.4); background: rgba(108,99,255,.06); }
    .option-item.selected { border-color: rgba(108,99,255,.6); background: rgba(108,99,255,.12); }
    .option-check {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color .2s, background .2s;
    }
    .option-item.selected .option-check { border-color: var(--accent1); background: var(--accent1); }
    .option-radio {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color .2s, background .2s;
    }
    .option-item.selected .option-radio { border-color: var(--accent2); background: var(--accent2); }
    .option-icon { font-size: 1.1rem; flex-shrink: 0; }
    .option-text { font-size: .9rem; color: var(--text-main); line-height: 1.4; }
    .options-confirm {
      margin-top: 14px; width: 100%; padding: 13px; border-radius: 12px;
      border: none; background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: #fff; font-size: .9rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity .2s;
    }
    .options-confirm:hover { opacity: .88; }

    /* ── Role cards ── */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .role-card {
      padding: 18px 16px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.02);
      cursor: pointer; transition: border-color .2s, background .2s, transform .15s;
      display: flex; flex-direction: column; gap: 10px; user-select: none;
    }
    .role-card:hover    { border-color: rgba(108,99,255,.4); background: rgba(108,99,255,.06); transform: translateY(-2px); }
    .role-card.selected { border-color: rgba(108,99,255,.7); background: rgba(108,99,255,.13); transform: translateY(-2px); }
    .role-card-icon { font-size: 1.6rem; }
    .role-card-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(108,99,255,.15); color: #a89cff;
      font-size: .72rem; font-weight: 700; flex-shrink: 0;
    }
    .role-card-spec { font-size: .9rem; font-weight: 700; color: var(--text-main); line-height: 1.3; }
    .role-card-badge {
      display: inline-flex; align-items: center; padding: 3px 10px;
      border-radius: 100px; font-size: .72rem; font-weight: 600;
      background: rgba(0,212,170,.12); color: var(--accent2); width: fit-content;
    }
    .role-card-comm { font-size: .8rem; color: var(--text-muted); line-height: 1.5; }

    .custom-role-wrap { margin-top: 4px; }
    .custom-role-label { font-size: .8rem; color: var(--text-muted); margin-bottom: 8px; }

    /* ── Fixed input area ── */
    .input-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,14,26,.92);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      padding: 16px 24px; z-index: 10;
    }
    .input-inner {
      max-width: 860px; margin: 0 auto;
      display: flex; gap: 12px; align-items: flex-end;
    }
    .input-field {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 16px;
      color: var(--text-main); font-size: .92rem; font-family: inherit;
      resize: none; outline: none; transition: border-color .2s;
      min-height: 48px; max-height: 120px; line-height: 1.5; width: 100%;
    }
    .input-field::placeholder { color: var(--text-muted); opacity: .6; }
    .input-field:focus { border-color: var(--accent1); }
    .send-btn {
      height: 48px; padding: 0 22px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: #fff; font-size: .9rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity .2s, transform .15s; flex-shrink: 0;
      display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .send-btn:hover:not(:disabled) { opacity: .88; transform: scale(1.02); }
    .send-btn:disabled { background: rgba(255,255,255,.1); color: var(--text-muted); cursor: default; transform: none; }

    /* ── Result card ── */
    .result-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      animation: fadeUp .4s ease; margin-top: 8px;
    }
    .result-header {
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .result-title {
      font-size: .97rem; font-weight: 700;
      background: linear-gradient(135deg, #a89cff, #00d4aa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .copy-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted);
      font-size: .8rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .2s; flex-shrink: 0;
    }
    .copy-btn:hover { border-color: var(--accent1); color: var(--text-main); }
    .copy-btn.copied { border-color: var(--accent2); color: var(--accent2); }
    .result-body {
      padding: 24px; font-size: .86rem; line-height: 1.75;
      color: var(--text-muted); white-space: pre-wrap; font-family: 'Inter', monospace;
    }

    /* ── Restart ── */
    .restart-wrap { text-align: center; padding: 24px 0 8px; }
    .restart-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 100px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: .88rem; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: border-color .2s, color .2s;
    }
    .restart-btn:hover { border-color: rgba(108,99,255,.6); color: var(--text-main); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: rgba(108,99,255,.4); border-radius: 3px; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      main { padding: 24px 0 130px; }
      .wrap { padding: 0 16px; }
      .msg-bubble { max-width: 86%; }
      .role-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .header-inner { height: 56px; gap: 10px; }
      .logo-icon { width: 34px; height: 34px; border-radius: 10px; }
      .logo-title { font-size: .93rem; }
      .logo-sub { display: none; }
      .back-link span { display: none; }
      .back-link { gap: 0; }
      main { padding: 20px 0 120px; }
      .wrap { padding: 0 12px; }
      .msg-bubble { max-width: 90%; font-size: .88rem; padding: 12px 14px; }
      .input-area { padding: 12px 16px; }
      .send-btn { padding: 0 16px; font-size: .85rem; }
      .result-body { padding: 18px 16px; font-size: .82rem; }
      .result-header { padding: 14px 16px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="wrap header-inner">
    <div class="logo-icon">🧠</div>
    <div>
      <div class="logo-title">Нейро-Маркетолог</div>
      <div class="logo-sub">Конструктор GPT-ассистента</div>
    </div>
    <a href="../../index.html" class="back-link">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      <span>На главную</span>
    </a>
  </div>
</header>

<main>
  <div class="wrap">

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span class="progress-title" id="progressTitle">Шаг 1 из 8 — Ваш бизнес</span>
        <span class="progress-count" id="progressCount">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-area" id="chatArea"></div>

    <!-- Options / role cards area -->
    <div id="optionsArea"></div>

  </div>
</main>

<!-- Fixed input -->
<div class="input-area" id="inputArea">
  <div class="input-inner">
    <textarea
      class="input-field"
      id="inputField"
      placeholder="Введи ответ здесь..."
      rows="1"
      onkeydown="handleKeyDown(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
      </svg>
      Отправить
    </button>
  </div>
</div>

<script>
  /* ── State ── */
  let step = 0;
  const answers = {};
  let busy = false;

  /* ── Steps: 8 total ──
     0: business (text)
     1: role (special — 3 cards + custom)
     2: audience (text)
     3: competitors (text)
     4: tasks (checkbox)
     5: format (radio)
     6: approach (radio)
     7: knowledge (checkbox)
  */
  const STEPS = [
    {
      label: 'Ваш бизнес', type: 'text',
      placeholder: 'Например: онлайн-школа английского, производство мебели, частный психолог…',
    },
    { label: 'Роль эксперта', type: 'role' },
    {
      label: 'Целевая аудитория', type: 'text',
      placeholder: 'Возраст, пол, занятость, главная боль / желание…',
    },
    {
      label: 'Конкуренты', type: 'text',
      placeholder: 'Названия компаний или «типичные игроки рынка»…',
    },
    {
      label: 'Задачи ассистента', type: 'checkbox',
      options: [
        { icon: '🔍', text: 'Анализ конкурентов — позиционирование, слабые стороны, УТП' },
        { icon: '👥', text: 'Профиль ЦА — боли, страхи, желания, триггеры' },
        { icon: '✍️', text: 'Идеи для контента — темы постов, Reels, статей' },
        { icon: '📢', text: 'Рекламные тексты и заголовки' },
        { icon: '🗺️', text: 'Стратегия продвижения по каналам' },
        { icon: '⭐', text: 'Анализ отзывов и обратной связи' },
      ],
    },
    {
      label: 'Формат анализа', type: 'radio',
      options: [
        { icon: '📌', text: 'Краткий стратегический отчёт — ключевые выводы и приоритеты. Лучше для: быстрого обзора рынка, приоритизации задач.' },
        { icon: '📊', text: 'Детальный анализ с цифрами — структурированный разбор с метриками и таблицами. Лучше для: анализа конкурентов, исследования аудитории.' },
        { icon: '🗺️', text: 'Практическое руководство — пошаговые инструкции с конкретными действиями. Лучше для: планирования кампаний, запуска продукта.' },
      ],
    },
    {
      label: 'Режим работы', type: 'radio',
      options: [
        { icon: '📋', text: 'Структурированный — GPT следует алгоритму: ситуация → анализ → выводы → действия. Лучше для глубокого разбора конкурентов и разработки стратегии.' },
        { icon: '⚡', text: 'Адаптивный — GPT гибко реагирует на конкретные запросы без жёсткого сценария. Лучше для быстрых идей и проверки гипотез.' },
      ],
    },
    {
      label: 'База знаний', type: 'checkbox',
      options: [
        { icon: '🏢', text: 'История, ценности и УТП бизнеса' },
        { icon: '🔍', text: 'Данные о конкурентах: сайты, кампании, ценовая политика' },
        { icon: '👥', text: 'Демография и поведение целевой аудитории' },
        { icon: '📈', text: 'Отраслевые тренды и лучшие маркетинговые практики' },
        { icon: '🏆', text: 'Примеры успешных кампаний в нише' },
        { icon: '📊', text: 'Данные аналитики: трафик, конверсии, ROI' },
      ],
    },
  ];

  const TOTAL = STEPS.length;

  const PROGRESS_LABELS = [
    'Шаг 1 из 8 — Ваш бизнес',
    'Шаг 2 из 8 — Роль эксперта',
    'Шаг 3 из 8 — Целевая аудитория',
    'Шаг 4 из 8 — Конкуренты',
    'Шаг 5 из 8 — Задачи ассистента',
    'Шаг 6 из 8 — Формат анализа',
    'Шаг 7 из 8 — Режим работы',
    'Шаг 8 из 8 — База знаний',
    '✓ Инструкция готова',
  ];

  const BOT_RESPONSES = [
    ans => `Отлично! Ниша зафиксирована: **«${ans}»**.\n\nТеперь давай определим **роль** твоего Нейро-Маркетолога. Вот три варианта — каждый со своей специализацией, характером и манерой общения. Выбери подходящий или опиши свой:`,
    ans => `Роль зафиксирована!\n\nТеперь давай разберёмся с аудиторией — без понимания покупателя даже лучший продукт продаётся плохо.\n\n**Шаг 3.** Опиши своего идеального клиента: кто он, сколько лет, чем занимается, какую главную проблему решает твой продукт?`,
    ans => `Портрет аудитории принят.\n\nТеперь переходим к конкурентам — именно здесь прячутся точки роста и незанятые ниши.\n\n**Шаг 4.** Назови 2–3 конкурента (конкретные компании или «типичные игроки рынка»).`,
    ans => `Конкуренты зафиксированы!\n\nТеперь выбери **задачи**, которые должен решать твой Нейро-Маркетолог. Можешь выбрать несколько.`,
    ans => `Задачи выбраны — хороший набор!\n\nОсталось определиться с форматом. **Как хочешь получать результаты** от ассистента?`,
    ans => `Формат зафиксирован!\n\nТеперь выбери **режим работы** ассистента. Это определит, как он будет подходить к анализу и отвечать на твои запросы:`,

    successEl.innerHTML = `
      <div class="msg-avatar">🧠</div>
      <div class="msg-bubble">
        <strong>Готово!</strong> Вот твоя персональная инструкция для GPT-ассистента.<br><br>
        Скопируй её и вставь в поле <em>«System prompt»</em> или <em>«Инструкция»</em>
        при создании своего GPT в ChatGPT.
      </div>`;
    chat.appendChild(successEl);
    scrollToBottom();

    setTimeout(() => {
      const resultEl = document.createElement('div');
      resultEl.className = 'result-card';
      resultEl.innerHTML = `
        <div class="result-header">
          <span class="result-title">📋 Инструкция для GPT-ассистента</span>
          <button class="copy-btn" id="copyBtn" onclick="copyInstruction()">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            Скопировать
          </button>
        </div>
        <div class="result-body" id="resultText">${esc(instruction)}</div>`;
      chat.appendChild(resultEl);
      scrollToBottom();
      window._instruction = instruction;

      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressCount').textContent = '100%';
      document.getElementById('progressTitle').textContent = PROGRESS_LABELS[TOTAL];

      setTimeout(() => {
        const restartEl = document.createElement('div');
        restartEl.className = 'restart-wrap';
        restartEl.innerHTML = `<button class="restart-btn" onclick="restartWizard()">↺ Создать другого ассистента</button>`;
        chat.appendChild(restartEl);
        scrollToBottom();
        busy = false;

  /* ── Copy ── */
  function copyInstruction() {
    navigator.clipboard.writeText(window._instruction || '').then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.innerHTML = `
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg> Скопировано!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg> Скопировать`;
      }, 2200);
    });
  }

  /* ── Restart ── */
  function restartWizard() {
    step = 0; busy = false;
    Object.keys(answers).forEach(k => delete answers[k]);
    document.getElementById('chatArea').innerHTML = '';
    document.getElementById('optionsArea').innerHTML = '';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('progressCount').textContent = '0%';
    document.getElementById('progressTitle').textContent = PROGRESS_LABELS[0];
    document.getElementById('inputArea').style.display = 'block';
    setTimeout(() => {
      addBotMsg('Начинаем заново! 🔄\n\n**Шаг 1.** Расскажи о своём бизнесе: что продаёшь или какие услуги оказываешь?');
    }, 200);
  }

  /* ── Helpers ── */
  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function disableInput(on) {
    document.getElementById('inputField').disabled = on;
    document.getElementById('sendBtn').disabled = on;
  }

  function scrollToBottom() {
    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 60);
  }

  function fmt(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\n/g,'<br>');
  }

  function esc(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }
</script>
